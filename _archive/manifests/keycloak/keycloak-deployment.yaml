apiVersion: v1
kind: Secret
metadata:
  name: keycloak-secret
  namespace: le-security
  labels:
    app: keycloak
    project: linkedeye
type: Opaque
stringData:
  admin-password: LinkedEye@2026
  db-password: Keycloak@DB2026
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: le-security
  labels:
    app: keycloak
    project: linkedeye
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.0
          args: ["start-dev"]
          env:
            - name: KEYCLOAK_ADMIN
              value: admin
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret
                  key: admin-password
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              value: jdbc:postgresql://postgresql.le-cicd.svc.cluster.local:5432/keycloak_db
            - name: KC_DB_USERNAME
              value: keycloak_user
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret
                  key: db-password
            - name: KC_PROXY_HEADERS
              value: xforwarded
            - name: KC_HOSTNAME
              value: keycloak.fs.le.finspot.in
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /realms/master
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /realms/master
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 30
