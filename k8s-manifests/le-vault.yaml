  spec:
    progressDeadlineSeconds: 600
    replicas: 1
    revisionHistoryLimit: 10
    selector:
      matchLabels:
        app: vault
    strategy:
      type: Recreate
    template:
      metadata:
        annotations:
          checksum/config: vault-config-v1
          kubectl.kubernetes.io/restartedAt: "2026-03-17T19:23:18+01:00"
        labels:
          app: vault
          project: linkedeye
      spec:
        containers:
        - command:
          - vault
          - server
          - -config=/vault/config/vault.hcl
          env:
          - name: VAULT_ADDR
            value: http://127.0.0.1:8200
          - name: VAULT_API_ADDR
            value: https://ls-vault.finspot.in
          - name: SKIP_CHOWN
            value: "true"
          - name: SKIP_SETCAP
            value: "true"
          - name: HOME
            value: /home/vault
          image: hashicorp/vault:1.15
          imagePullPolicy: IfNotPresent
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /v1/sys/health?standbyok=true&sealedcode=204&uninitcode=204
              port: 8200
              scheme: HTTP
            initialDelaySeconds: 60
            periodSeconds: 30
            successThreshold: 1
            timeoutSeconds: 1
          name: vault
          ports:
          - containerPort: 8200
            name: http
            protocol: TCP
          - containerPort: 8201
            name: cluster
            protocol: TCP
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /v1/sys/health?standbyok=true
              port: 8200
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
            requests:
              cpu: 250m
              memory: 256Mi
          securityContext:
            capabilities:
              add:
              - IPC_LOCK
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
          - mountPath: /vault/config
            name: vault-config
          - mountPath: /vault/audit
            name: vault-audit
        dnsPolicy: ClusterFirst
        initContainers:
        - command:
          - sh
          - -c
          - until nc -z 172.20.67.14 5432; do echo 'waiting for postgres'; sleep 3;
            done
          image: busybox:1.35
          imagePullPolicy: IfNotPresent
          name: wait-for-postgres
          resources: {}
          securityContext:
            runAsUser: 1000
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
        - command:
          - sh
          - -c
          - |
            psql "postgres://vault:Vault@FinSpot2025!@172.20.67.14:5432/vaultdb?sslmode=disable" \
              -c "CREATE TABLE IF NOT EXISTS vault_kv_store (
                    parent_path TEXT COLLATE \"C\" NOT NULL,
                    path        TEXT COLLATE \"C\",
                    key         TEXT COLLATE \"C\",
                    value       BYTEA,
                    CONSTRAINT pkey PRIMARY KEY (path, key)
                  );" \
              -c "CREATE INDEX IF NOT EXISTS parent_path_idx ON vault_kv_store (parent_path);"
            echo "Vault DB table ready."
          image: postgres:15-alpine
          imagePullPolicy: IfNotPresent
          name: init-db
          resources: {}
          securityContext:
            runAsUser: 70
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
        nodeSelector:
          role: mgmt-tools
        restartPolicy: Always
        schedulerName: default-scheduler
        securityContext:
          fsGroup: 1000
          runAsNonRoot: true
          runAsUser: 100
        serviceAccount: vault
        serviceAccountName: vault
        terminationGracePeriodSeconds: 30
        volumes:
        - configMap:
            defaultMode: 420
            name: vault-config
          name: vault-config
        - name: vault-audit
          persistentVolumeClaim:
            claimName: vault-audit-pvc
