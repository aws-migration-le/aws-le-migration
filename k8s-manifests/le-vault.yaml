- apiVersion: v1
  data:
    vault.hcl: |
      # ── Storage Backend — PostgreSQL (shared le-postgres) ──────
      storage "postgresql" {
        connection_url = "host=172.20.67.14 port=5432 user=vault password='VaultFinSpot2025' dbname=vaultdb sslmode=disable"
        table          = "vault_kv_store"
        ha_enabled     = "false"
      }

      # ── Listener ───────────────────────────────────────────────
      listener "tcp" {
        address       = "0.0.0.0:8200"
        tls_disable   = "true"    # TLS terminated at ALB

        # Allow health checks from ALB
        telemetry {
          unauthenticated_metrics_access = true
        }
      }

      # ── API Address ────────────────────────────────────────────
      api_addr     = "https://le-vault.finspot.in"
      cluster_addr = "https://vault:8201"

      # ── UI ─────────────────────────────────────────────────────
      ui = true

      # ── Telemetry ──────────────────────────────────────────────
      telemetry {
        prometheus_retention_time = "30s"
        disable_hostname          = true
      }

      # ── Log ────────────────────────────────────────────────────
      log_level  = "Info"
      log_format = "json"
