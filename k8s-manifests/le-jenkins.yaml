- apiVersion: v1
  data:
    jenkins.yaml: |
      jenkins:
        systemMessage: "LinkedEye CI/CD — FinSpot Technology Solutions"
        numExecutors: 0
        mode: EXCLUSIVE
        scmCheckoutRetryCount: 3

        securityRealm:
          local:
            allowsSignup: false
            users:
              - id: "admin"
                password: "${JENKINS_ADMIN_PASSWORD}"
              - id: "rajkumar"
                password: "${JENKINS_USER_PASSWORD}"

        authorizationStrategy:
          roleBased:
            roles:
              global:
                - name: "admin"
                  description: "Jenkins Administrators"
                  permissions:
                    - "Overall/Administer"
                  assignments:
                    - "admin"
                    - "rajkumar"
                - name: "developer"
                  description: "Developers"
                  permissions:
                    - "Overall/Read"
                    - "Job/Build"
                    - "Job/Read"
                    - "Job/Workspace"
                  assignments:
                    - "developer"

        clouds:
          - kubernetes:
              name: "kubernetes"
              serverUrl: "https://kubernetes.default.svc.cluster.local"
              namespace: "le-jenkins"
              jenkinsUrl: "http://jenkins-svc:8080"
              jenkinsTunnel: "jenkins-agent-svc:50000"
              connectTimeout: 5
              readTimeout: 15
              maxRequestsPerHostStr: "32"
              podLabels:
                - key: "app"
                  value: "jenkins-agent"
              templates:
                - name: "default-agent"
                  label: "k8s-agent"
                  namespace: "le-jenkins"
                  containers:
                    - name: "jnlp"
                      image: "jenkins/inbound-agent:latest-jdk17"
                      resourceRequestCpu: "500m"
                      resourceRequestMemory: "512Mi"
                      resourceLimitCpu: "1000m"
                      resourceLimitMemory: "1Gi"
                - name: "docker-agent"
                  label: "docker-agent"
                  namespace: "le-jenkins"
                  serviceAccount: "jenkins"
                  containers:
                    - name: "jnlp"
                      image: "jenkins/inbound-agent:latest-jdk17"
                      resourceRequestCpu: "500m"
                      resourceRequestMemory: "512Mi"
                    - name: "docker"
                      image: "docker:24-dind"
                      privileged: true
                      resourceRequestCpu: "500m"
                      resourceRequestMemory: "512Mi"
                      resourceLimitCpu: "2000m"
                      resourceLimitMemory: "2Gi"
                  volumes:
                    - emptyDirVolume:
                        memory: false
                        mountPath: "/var/lib/docker"

      credentials:
        system:
          domainCredentials:
            - credentials:
                - usernamePassword:
                    scope: GLOBAL
                    id: "harbor-credentials"
                    username: "admin"
                    password: "${HARBOR_ADMIN_PASSWORD}"
                    description: "Harbor Registry credentials"
                - string:
                    scope: GLOBAL
                    id: "argocd-token"
                    secret: "${ARGOCD_AUTH_TOKEN}"
                    description: "ArgoCD auth token"

      unclassified:
        location:
          url: "https://le-jenkins.finspot.in/"
          adminAddress: "rajkumar.madhu@finspot.in"
        globalLibraries:
          libraries: []
        slackNotifier:
          baseUrl: ""
          teamDomain: "finspot"
  kind: ConfigMap
  metadata:
    annotations:
        {"apiVersion":"v1","data":{"jenkins.yaml":"jenkins:\n  systemMessage: \"LinkedEye CI/CD — FinSpot Technology Solutions\"\n  numExecutors: 0\n  mode: EXCLUSIVE\n  scmCheckoutRetryCount: 3\n\n  securityRealm:\n    local:\n      allowsSignup: false\n      users:\n        - id: \"admin\"\n          password: \"${JENKINS_ADMIN_PASSWORD}\"\n        - id: \"rajkumar\"\n          password: \"${JENKINS_USER_PASSWORD}\"\n\n  authorizationStrategy:\n    roleBased:\n      roles:\n        global:\n          - name: \"admin\"\n            description: \"Jenkins Administrators\"\n            permissions:\n              - \"Overall/Administer\"\n            assignments:\n              - \"admin\"\n              - \"rajkumar\"\n          - name: \"developer\"\n            description: \"Developers\"\n            permissions:\n              - \"Overall/Read\"\n              - \"Job/Build\"\n              - \"Job/Read\"\n              - \"Job/Workspace\"\n            assignments:\n              - \"developer\"\n\n  clouds:\n    - kubernetes:\n        name: \"kubernetes\"\n        serverUrl: \"https://kubernetes.default.svc.cluster.local\"\n        namespace: \"le-jenkins\"\n        jenkinsUrl: \"http://jenkins-svc:8080\"\n        jenkinsTunnel: \"jenkins-agent-svc:50000\"\n        connectTimeout: 5\n        readTimeout: 15\n        maxRequestsPerHostStr: \"32\"\n        podLabels:\n          - key: \"app\"\n            value: \"jenkins-agent\"\n        templates:\n          - name: \"default-agent\"\n            label: \"k8s-agent\"\n            namespace: \"le-jenkins\"\n            containers:\n              - name: \"jnlp\"\n                image: \"jenkins/inbound-agent:latest-jdk17\"\n                resourceRequestCpu: \"500m\"\n                resourceRequestMemory: \"512Mi\"\n                resourceLimitCpu: \"1000m\"\n                resourceLimitMemory: \"1Gi\"\n          - name: \"docker-agent\"\n            label: \"docker-agent\"\n            namespace: \"le-jenkins\"\n            serviceAccount: \"jenkins\"\n            containers:\n              - name: \"jnlp\"\n                image: \"jenkins/inbound-agent:latest-jdk17\"\n                resourceRequestCpu: \"500m\"\n                resourceRequestMemory: \"512Mi\"\n              - name: \"docker\"\n                image: \"docker:24-dind\"\n                privileged: true\n                resourceRequestCpu: \"500m\"\n                resourceRequestMemory: \"512Mi\"\n                resourceLimitCpu: \"2000m\"\n                resourceLimitMemory: \"2Gi\"\n            volumes:\n              - emptyDirVolume:\n                  memory: false\n                  mountPath: \"/var/lib/docker\"\n\ncredentials:\n  system:\n    domainCredentials:\n      - credentials:\n          - usernamePassword:\n              scope: GLOBAL\n              id: \"harbor-credentials\"\n              username: \"admin\"\n              password: \"${HARBOR_ADMIN_PASSWORD}\"\n              description: \"Harbor Registry credentials\"\n          - string:\n              scope: GLOBAL\n              id: \"argocd-token\"\n              secret: \"${ARGOCD_AUTH_TOKEN}\"\n              description: \"ArgoCD auth token\"\n\nunclassified:\n  location:\n    url: \"https://le-jenkins.finspot.in/\"\n    adminAddress: \"rajkumar.madhu@finspot.in\"\n  globalLibraries:\n    libraries: []\n  slackNotifier:\n    baseUrl: \"\"\n    teamDomain: \"finspot\"\n"},"kind":"ConfigMap","metadata":{"annotations":{},"labels":{"app":"jenkins","project":"linkedeye"},"name":"jenkins-casc-config","namespace":"le-jenkins"}}
