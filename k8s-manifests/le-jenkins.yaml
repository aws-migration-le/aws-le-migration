  spec:
    progressDeadlineSeconds: 600
    replicas: 1
    revisionHistoryLimit: 10
    selector:
      matchLabels:
        app: jenkins
    strategy:
      type: Recreate
    template:
      metadata:
        annotations:
          backup.velero.io/backup-volumes: jenkins-home
          backup.velero.io/backup-volumes-excludes: ""
        labels:
          app: jenkins
          project: linkedeye
      spec:
        containers:
        - env:
          - name: CASC_JENKINS_CONFIG
            value: /var/jenkins_casc/jenkins.yaml
          - name: JAVA_OPTS
            value: -Djenkins.install.runSetupWizard=false -Dhudson.model.DirectoryBrowserSupport.CSP=
              -Xmx2048m -Xms512m -Djenkins.model.Jenkins.crumbIssuerProxyCompatibility=true
              -Dhudson.security.csrf.DefaultCrumbIssuer.EXCLUDE_SESSION_ID=true -Dorg.jenkinsci.plugins.sshd.SSHD.fixHostKeysDuringInit=true
          - name: POSTGRES_HOST
            valueFrom:
              secretKeyRef:
                key: POSTGRES_HOST
                name: le-jenkins-db-secret
          - name: POSTGRES_PORT
            valueFrom:
              secretKeyRef:
                key: POSTGRES_PORT
                name: le-jenkins-db-secret
          - name: POSTGRES_DB
            valueFrom:
              secretKeyRef:
                key: POSTGRES_DB
                name: le-jenkins-db-secret
          - name: POSTGRES_USER
            valueFrom:
              secretKeyRef:
                key: POSTGRES_USER
                name: le-jenkins-db-secret
          - name: POSTGRES_PASSWORD
            valueFrom:
              secretKeyRef:
                key: POSTGRES_PASSWORD
                name: le-jenkins-db-secret
          - name: JENKINS_ADMIN_PASSWORD
            valueFrom:
              secretKeyRef:
                key: JENKINS_ADMIN_PASSWORD
                name: jenkins-secrets
          - name: JENKINS_USER_PASSWORD
            valueFrom:
              secretKeyRef:
                key: JENKINS_USER_PASSWORD
                name: jenkins-secrets
          - name: HARBOR_ADMIN_PASSWORD
            valueFrom:
              secretKeyRef:
                key: HARBOR_ADMIN_PASSWORD
                name: jenkins-secrets
          - name: ARGOCD_AUTH_TOKEN
            valueFrom:
              secretKeyRef:
                key: ARGOCD_AUTH_TOKEN
                name: jenkins-secrets
          image: jenkins/jenkins:lts-jdk21
          imagePullPolicy: IfNotPresent
          livenessProbe:
            failureThreshold: 5
            httpGet:
              path: /login
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 90
            periodSeconds: 20
            successThreshold: 1
            timeoutSeconds: 10
          name: jenkins
          ports:
          - containerPort: 8080
            name: http
            protocol: TCP
          - containerPort: 50000
            name: agent
            protocol: TCP
          readinessProbe:
            failureThreshold: 5
            httpGet:
              path: /login
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 60
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 10
          resources:
            limits:
              cpu: "2"
              memory: 3Gi
            requests:
              cpu: 500m
              memory: 1Gi
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
          - mountPath: /var/jenkins_home
            name: jenkins-home
          - mountPath: /var/jenkins_casc
            name: jenkins-casc
            readOnly: true
        dnsPolicy: ClusterFirst
        initContainers:
        - command:
          - sh
          - -c
          - |
            echo "Waiting for PostgreSQL..."
            until nc -z 172.20.67.14 5432; do
              echo "PostgreSQL not ready — retrying in 3s"
              sleep 3
            done
            echo "PostgreSQL is ready."
          image: busybox:1.35
          imagePullPolicy: IfNotPresent
          name: wait-for-postgres
          resources: {}
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
        - command:
          - sh
          - -c
          - chown -R 1000:1000 /var/jenkins_home
          image: busybox:1.35
          imagePullPolicy: IfNotPresent
          name: fix-permissions
          resources: {}
          securityContext:
            runAsUser: 0
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
          - mountPath: /var/jenkins_home
            name: jenkins-home
        nodeSelector:
          jenkins: "true"
        restartPolicy: Always
        schedulerName: default-scheduler
        securityContext:
          fsGroup: 1000
          runAsUser: 1000
        serviceAccount: jenkins
        serviceAccountName: jenkins
        terminationGracePeriodSeconds: 30
        volumes:
        - name: jenkins-home
          persistentVolumeClaim:
            claimName: jenkins-pvc
        - configMap:
            defaultMode: 420
            name: jenkins-casc-config
          name: jenkins-casc
